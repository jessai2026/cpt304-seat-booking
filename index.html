<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <title>Project</title>
</head>
<body>
    <!-- Baseline 4: Language toggle bar -->
    <div id="lang-bar">
        <button id="lang-toggle" class="btn" onclick="i18n.toggle()"
                aria-label="Switch language" data-i18n="lang_toggle">中文</button>
    </div>

    <!-- Fix D3: wrap app in <main> landmark element (WCAG 1.3.1) -->
    <main id="main-content">
    <div id="seat-booking-app">
        <div id="settings" class="settings">
            <div class="services-list">
                <!-- Fix D2: add <label> for select element (WCAG 1.3.1 / 4.1.2) -->
                <label for="services-list" data-i18n="select_service">Select service:</label>
                <select name="services-list" id="services-list"></select>
                <!-- Fix D1: replaced <h3> with <label> to associate labels with inputs (WCAG 1.3.1 / 4.1.2) -->
                <label for="service-name" data-i18n="movie_title">Movie title:</label>
                <input type="text" name="service-name" id="service-name">
                <label for="service-price" data-i18n="price_base">Price base:</label>
                <input type="number" name="service-price" id="service-price" min="0" max="100" step="0.01">
                <div class="services-list__btns">
                    <button id="service-add-btn" class="btn" data-i18n="add_new">Add new</button>
                    <button id="service-update-btn" class="btn" data-i18n="save_changes">Save changes</button>
                    <button id="service-delete-btn" class="btn" data-i18n="delete">Delete</button>
                </div>
            </div>
            <div class="sectors">
                <button id="sectors-price-btn" class="btn" data-i18n="edit_sector_prices">Edit sectors' prices</button>
                <h3 data-i18n="price_multipliers">Price multipliers for each sector:</h3>
                <ul id="sectors-list" class="sectors__list"></ul>
                <button id="sectors-save-btn" class="btn" data-i18n="save">Save</button>
            </div>
            <div id="order" class="order">
                <div class="order__header">
                    <h2 data-i18n="tickets">Tickets:</h2>
                </div>
                <div class="order__main">
                    <ul id="order-details"></ul>
                </div>
                <div id="order-footer" class="order__footer">
                    <span id="order-total-price"></span>
                    <button id="book-seats-btn" class="btn" data-i18n="buy">Buy</button>
                </div>
            </div>
        </div>
        <div id="screening-room-1">
            <div id="screen" data-i18n="screen">Screen</div>
            <div id="seats"></div>
        </div>
    </div>
    </main>

    <script src="script/i18n.js"></script>
    <script src="script/seat-booking-app.js"></script>
</body>
</html>
